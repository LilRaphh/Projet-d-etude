# =============================================================
#  docker-compose.yml — Wardrobe app + Ollama
#
#  Démarrer : docker compose up -d
#  Arrêter  : docker compose down
#  Logs     : docker compose logs -f app
#
#  App → http://localhost:5001
# =============================================================

services:

  app:
    build: .
    container_name: wardrobe_app
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      OLLAMA_URL: http://ollama:11434
      HF_HOME: /app/data/hf_cache
      DATABASE_URL: sqlite:////app/data/wardrobe.db
    volumes:
      - uploads:/app/static/uploads
      - app_data:/app/data
      - ./logs:/app/logs
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ollama:
    image: ollama/ollama:latest
    container_name: wardrobe_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  uploads:
  app_data:
  ollama_data:
